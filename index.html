// ══════════════════════════════════════════════════════════
//  UTILITY: parse markup [english|chinese] in a paragraph
// ══════════════════════════════════════════════════════════
function parseParagraph(text) {
  const parts = [];
  const re = /\[([^\|]+)\|([^\]]+)\]/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ type:'text', val: text.slice(last, m.index) });
    parts.push({ type:'hw', en: m[1], zh: m[2] });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ type:'text', val: text.slice(last) });
  return parts;
}

// ══════════════════════════════════════════════════════════
//  COMPONENTS
// ══════════════════════════════════════════════════════════

function speakText(text, rate=0.88) {
  const clean = text.replace(/\[([^\|]+)\|[^\]]+\]/g,'$1')
                    .replace(/💡[^\n]*/g,'').replace(/📌[^\n]*/g,'').trim();
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(clean);
  u.lang='en-US'; u.rate=rate;
  window.speechSynthesis.speak(u);
}

function HighlightWord({ en, zh }) {
  const [show, setShow] = useState(false);
  return (
    <span className="relative" style={{display:'inline'}}>
      <span className="hw" onClick={e => { e.stopPropagation(); speakText(en, 0.8); setShow(s=>!s); }}>{en}</span>
      {show && (
        <span className="absolute bottom-full left-1/2 -translate-x-1/2 mb-1 px-2 py-1 text-white text-sm rounded shadow-lg whitespace-nowrap z-30 pointer-events-none"
          style={{background:'#7c2d12'}}
          style={{fontSize:'13px'}}>
          {zh}
        </span>
      )}
    </span>
  );
}

function InteractivePara({ text, onWordClick, activeWord }) {
  const parts = parseParagraph(text);
  return (
    <span className="leading-relaxed">
      {parts.map((p, i) => {
        if (p.type === 'hw') return <HighlightWord key={i} en={p.en} zh={p.zh} />;
        // Split plain text into clickable words
        return p.val.split(/(\s+)/).map((tok, j) => {
          if (/^\s+$/.test(tok)) return <span key={j}>{tok}</span>;
          const clean = tok.replace(/^[^a-zA-Z']+|[^a-zA-Z']+$/g,'').toLowerCase();
          if (!clean) return <span key={j}>{tok}</span>;
          const isActive = activeWord === clean;
          return (
            <span key={j} className={`plain-w ${isActive ? 'bg-amber-200 text-amber-900' : ''}`}
              onClick={e => { e.stopPropagation(); onWordClick(clean, tok); }}>
              {tok}
            </span>
          );
        });
      })}
    </span>
  );
}

function CultureNote({ text }) {
  const [open, setOpen] = useState(false);
  const title = text.split('：')[0] || text.slice(0,20);
  return (
    <div className="my-2 rounded-lg border border-amber-300 overflow-hidden">
      <button className="w-full flex items-center gap-2 px-3 py-2 bg-amber-50 hover:bg-amber-100 transition-colors text-left"
        onClick={() => setOpen(o=>!o)}>
        <span className="text-amber-600">💡</span>
        <span className="flex-1 text-sm font-bold text-amber-800 truncate">{title}…</span>
        <span className="text-amber-500 text-xs">{open ? '▲' : '▼'}</span>
      </button>
      {open && (
        <div className="px-4 py-3 bg-amber-50 text-stone-600 text-sm leading-relaxed">
          {text}
        </div>
      )}
    </div>
  );
}

function PinNote({ text }) {
  return (
    <div className="my-2 rounded-lg border border-blue-300 bg-blue-50 px-4 py-3 text-blue-800 text-sm leading-relaxed">
      {text}
    </div>
  );
}

function AudioBtn({ text, small=false }) {
  const [playing, setPlaying] = useState(false);
  const handle = (e) => {
    e.stopPropagation();
    window.speechSynthesis.cancel();
    if (playing) { setPlaying(false); return; }
    const clean = text.replace(/\[([^\|]+)\|[^\]]+\]/g,'$1')
                      .replace(/💡[^\n]*/g,'').replace(/📌[^\n]*/g,'').trim();
    const u = new SpeechSynthesisUtterance(clean);
    u.lang='en-US'; u.rate=0.88;
    u.onend = () => setPlaying(false);
    u.onerror = () => setPlaying(false);
    setPlaying(true);
    window.speechSynthesis.speak(u);
  };
  const sz = small ? "p-1" : "p-1.5";
  return (
    <button onClick={handle}
      className={`shrink-0 ${sz} rounded-full border transition-colors
        ${playing ? 'bg-red-700 text-white border-red-700' : 'bg-white text-amber-700 border-amber-500 hover:bg-amber-50'}`}
      title="Listen">
      {playing ? '⏹' : '🔊'}
    </button>
  );
}

function WordCard({ info, onClose }) {
  if (!info) return null;
  const speak = () => {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(info.word);
    u.lang='en-US'; u.rate=0.8;
    window.speechSynthesis.speak(u);
  };
  return (
    <div className="dict-card fixed bottom-4 left-1/2 w-[90%] max-w-xs bg-white rounded-2xl shadow-2xl border border-amber-200 z-50 overflow-hidden"
      onClick={e => e.stopPropagation()}>
      <div className="bg-amber-100 px-4 py-2 flex justify-between items-center border-b border-amber-200">
        <span className="text-xs font-bold text-amber-700 tracking-widest uppercase">Dictionary</span>
        <button onClick={onClose} className="text-amber-600 hover:text-red-700 font-bold text-lg leading-none">×</button>
      </div>
      <div className="p-4">
        <div className="flex justify-between items-center mb-2">
          <h3 className="text-2xl font-bold text-stone-800">{info.word}</h3>
          <button onClick={speak} className="text-amber-600 hover:text-amber-800 text-xl">🔊</button>
        </div>
        {info.found ? (
          <>
            <div className="text-xs text-stone-400 uppercase tracking-wider mb-1">{info.data.pos}</div>
            <div className="text-lg text-red-800 font-medium border-l-4 border-amber-400 pl-3">{info.data.ch}</div>
          </>
        ) : (
          <div className="text-stone-400 italic text-sm">字典擴充中，已播放發音。</div>
        )}
      </div>
    </div>
  );
}

// ── Single paragraph row ──
function ParaRow({ text, onWordClick, activeWord }) {
  if (text.startsWith('💡')) return <CultureNote text={text.slice(1).trim()} />;
  if (text.startsWith('📌')) return <PinNote text={text.slice(1).trim()} />;
  if (text.startsWith('—')) return (
    <div className="mt-6 mb-2 text-center text-stone-400 text-sm font-bold tracking-wider border-t-2 border-dashed border-stone-300 pt-3">{text}</div>
  );
  return (
    <div className="flex items-start gap-3 mb-4 p-4 bg-white rounded-xl shadow-sm border border-stone-200">
      <div className="flex-1 text-lg leading-loose text-stone-800">
        <InteractivePara text={text} onWordClick={onWordClick} activeWord={activeWord} />
      </div>
      <AudioBtn text={text} />
    </div>
  );
}

        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-base border-2 ${isMine ? 'border-yellow-400 text-yellow-900' : 'border-purple-300 text-purple-900'}`}
          style={{background: isMine ? '#fde68a' : '#e9d5ff'}}>
          {person.seat}
        </div>
        <div className="flex-1">
          <div className="flex items-center gap-2">
            <span className="font-bold text-purple-900 text-base">{person.role}</span>
            {isMine && <span className="px-2 py-0.5 rounded text-xs font-bold bg-yellow-300 text-yellow-900">你的工作</span>}
          </div>
          <div className="text-purple-600 text-sm">站點：{person.spotName || '全場'}</div>
        </div>
        <span className="text-purple-400 text-sm">{open ? '▲' : '▼'}</span>
      </button>
      {open && (
        <div className="px-4 pb-4 pt-1 border-t border-purple-100">
          {person.duties && person.duties.length > 0 ? (
            <ul className="space-y-2 mt-2">
              {person.duties.map((d, i) => (
                <li key={i} className="flex items-start gap-2 text-base text-purple-800">
                  <span className="text-purple-400 mt-1">▸</span>
                  <span>{d}</span>
                </li>
              ))}
            </ul>
          ) : (
            <p className="text-purple-400 italic text-sm mt-2">工作內容待填入</p>
          )}
        </div>
      )}
    </div>
  );
}

function SupportSection({ selectedSeat }) {
  const [open, setOpen] = useState(false);
  const myRole = SUPPORT_STAFF.find(p => p.seat === selectedSeat);

  if (SUPPORT_STAFF.length === 0) return (
    <div className="bg-white rounded-2xl border-2 border-dashed border-purple-200 p-5 mb-5 text-center">
      <div className="text-purple-400 text-2xl mb-2">🔧</div>
      <div className="text-purple-700 font-bold text-base mb-1">後勤人員工作分配</div>
      <div className="text-purple-400 text-sm">老師上傳名單後即會顯示</div>
    </div>
  );

  return (
    <div className="bg-white rounded-2xl border-2 border-purple-200 overflow-hidden mb-5 shadow-sm">
      <button className="w-full flex items-center gap-3 px-5 py-4 text-left"
        style={{background:'linear-gradient(90deg,#4c1d95,#7c3aed)'}}
        onClick={() => setOpen(o=>!o)}>
        <span className="text-2xl">🔧</span>
        <div className="flex-1">
          <div className="text-white font-bold text-base">後勤人員工作分配</div>
          <div className="text-purple-200 text-sm">{SUPPORT_STAFF.length} 位同學 · 點擊展開</div>
        </div>
        {myRole && (
          <span className="px-2 py-1 rounded-lg text-xs font-bold bg-yellow-300 text-yellow-900">你在這裡！</span>
        )}
        <span className="text-purple-200 text-sm">{open ? '▲' : '▼'}</span>
      </button>
      {open && (
        <div className="p-4 grid gap-3">
          {SUPPORT_STAFF.map((p, i) => (
            <SupportCard key={i} person={p} isMine={selectedSeat === p.seat} />
          ))}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  HOME PAGE
// ══════════════════════════════════════════════════════════
function HomePage({ onNavigate, onSmallTalk }) {
  const [selectedSeat, setSelectedSeat] = useState(null);

  // Find all (spotId, colKey) pairs for a given seat
  function findAssignments(seat) {
    const result = [];
    for (const [spotId, cols] of Object.entries(ASSIGNMENTS)) {
      for (const [colKey, seats] of Object.entries(cols)) {
        if (seats.includes(seat)) result.push({ spotId: parseInt(spotId), colKey });
      }
    }
    return result;
  }

  const myAssignments = selectedSeat ? findAssignments(selectedSeat) : [];

  function isMyCell(spotId, colKey) {
    return myAssignments.some(a => a.spotId === spotId && a.colKey === colKey);
  }

  const spotIds = Object.keys(ASSIGNMENTS).map(Number);

  return (
    <div className="min-h-screen bg-orange-50 pb-10">
      {/* Title Bar */}
      <div className="text-white px-4 pt-6 pb-5 shadow-lg" style={{background:'linear-gradient(135deg, #7c2d12 0%, #c2410c 60%, #ea580c 100%)'}}>
        <div className="max-w-3xl mx-auto text-center">
          <div className="text-orange-200 text-xs tracking-widest uppercase mb-2">🏮 鹿港英語導覽活動 · 2026</div>
          <h1 className="text-3xl font-bold tracking-wider mb-2">學生任務 App</h1>
          <p className="text-orange-200 text-sm">選擇你的座號，找到你的任務，點擊查看腳本</p>
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-3 pt-4">
        {/* Small Talk Section */}
        <div className="bg-white rounded-2xl shadow-md border border-orange-200 p-5 mb-5">
          <div className="text-sm font-bold text-orange-700 uppercase tracking-wider mb-1 text-center">
            💬 Small Talk 口說練習
          </div>
          <div className="text-xs text-stone-400 text-center mb-4">點擊主題，練習跟來賓聊天的英文句子</div>
          <div className="grid grid-cols-2 gap-3">
            {SMALL_TALK_DATA.map(t => (
              <button key={t.id} onClick={() => onSmallTalk(t.id)}
                className={`flex flex-col items-center gap-2 p-4 rounded-xl border-2 transition-all hover:scale-105 hover:shadow-md ${t.color}`}>
                <span className="text-3xl">{t.icon}</span>
                <span className="font-bold text-sm text-center leading-tight">{t.title}</span>
                <span className="text-xs opacity-70">{t.enTitle}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Assignment Table */}
        <div className="bg-white rounded-2xl shadow-md border border-orange-200 overflow-hidden mb-5">
          <div className="px-4 py-3 border-b border-orange-200" style={{background:'linear-gradient(90deg,#7c2d12,#c2410c)'}}>
            <span className="text-white font-bold text-base">📋 工作分配總表</span>
            <span className="text-orange-200 text-sm ml-2">點座號進入腳本</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full border-collapse">
              <thead>
                <tr style={{background:'linear-gradient(90deg,#431407,#9a3412)'}}>
                  <th className="px-3 py-4 text-left text-sm font-bold sticky left-0 z-10 text-white min-w-[100px]"
                    style={{background:'#431407'}}>站點</th>
                  {COLUMNS.map(c => (
                    <th key={c.key} className="px-3 py-4 text-center text-sm font-bold min-w-[88px] whitespace-nowrap text-white">
                      <div className="text-base">{c.label}</div>
                      <div className="text-orange-300 font-normal text-xs mt-0.5">{c.en}</div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {spotIds.map((spotId, idx) => {
                  const spot = SPOT_CONTENT[spotId];
                  const asgn = ASSIGNMENTS[spotId];
                  return (
                    <tr key={spotId} className={idx % 2 === 0 ? 'bg-orange-50' : 'bg-white'}>
                      <td className="px-3 py-3 sticky left-0 z-10 font-bold border-r border-orange-100"
                        style={{background: idx%2===0 ? '#fff7ed':'#ffffff'}}>
                        <span className="text-orange-400 text-xs font-bold">#{spotId}</span>
                        <div className="text-orange-900 text-sm leading-tight font-bold">{spot?.name || ''}</div>
                        <div className="text-orange-500 text-xs">{spot?.enName || ''}</div>
                      </td>
                      {COLUMNS.map(col => {
                        const seats = asgn?.[col.key];
                        const isEmpty = !seats || seats.length === 0;
                        if (isEmpty) return (
                          <td key={col.key} className="px-2 py-3 text-center text-orange-200 text-base">—</td>
                        );
                        return (
                          <td key={col.key} className="px-2 py-2 text-center">
                            <div className="flex flex-wrap gap-1 justify-center">
                              {seats.map(s => {
                                const mine = selectedSeat === s;
                                return (
                                  <button key={s}
                                    onClick={() => onNavigate({ spotId, colKey: col.key, seat: s })}
                                    className={`px-3 py-2 rounded-lg text-sm font-bold border-2 transition-all
                                      ${mine
                                        ? 'bg-red-700 text-white border-red-700 scale-110 shadow-md ring-2 ring-orange-400 ring-offset-1'
                                        : `${col.color} hover:opacity-80 hover:scale-105`}`}>
                                    {s}
                                  </button>
                                );
                              })}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* Legend */}
        <div className="bg-white rounded-2xl border border-orange-200 p-4 mb-5 shadow-sm">
          <div className="text-sm font-bold text-orange-700 uppercase tracking-wider mb-3 text-center">欄位說明</div>
          <div className="flex flex-wrap gap-2 justify-center">
            {COLUMNS.map(c => (
              <span key={c.key} className={`px-3 py-1.5 rounded-full text-sm font-bold border-2 ${c.color}`}>
                {c.label}
              </span>
            ))}
          </div>
        </div>

        {/* Support Staff Section 後勤人員 */}
        <SupportSection selectedSeat={selectedSeat} />

        {/* Reminder */}
        <div className="p-5 rounded-2xl text-white text-base leading-relaxed shadow-lg mb-3"
          style={{background:'linear-gradient(135deg,#7f1d1d,#b91c1c)'}}>
          <div className="font-bold text-red-200 text-sm uppercase tracking-wider mb-2">⚠️ 全體提醒 Universal Reminder</div>
          自己的站點走完，一定要<strong>送來賓去下一站</strong>，要在下一站旁邊跟聽和幫忙，隨時 <strong>stand by</strong>！
        </div>

        <div className="text-center text-orange-400 text-xs mt-4 pb-4">
          🏮 鹿港高中 英語導覽 · 2026 春季
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  APP ROOT
// ══════════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState('home');
  const [task, setTask] = useState(null);
  const [talkId, setTalkId] = useState(null);

  if (page === 'task' && task) {
    return <TaskPage spotId={task.spotId} colKey={task.colKey} seat={task.seat}
      onBack={() => { setPage('home'); }} />;
  }
  if (page === 'smalltalk' && talkId) {
    return <SmallTalkPage topicId={talkId} onBack={() => { setPage('home'); }} />;
  }
  return <HomePage
    onNavigate={info => { setTask(info); setPage('task'); }}
    onSmallTalk={id => { setTalkId(id); setPage('smalltalk'); }}
  />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
